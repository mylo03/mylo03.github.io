<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Mylo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #fdfdfd;
        }


        .header_container {
            width: 95vw;
            margin-top: 10px;
            display: flex;
            font-size: 40px;
            align-items: center;
            justify-content: space-between;
            margin-left: auto;
            margin-right: auto;
        }

        .header_container div {
            color: #121111;  
        }

        .linkedin-logo {
            font-size: 30px;
            color: #6f6b6b;
            transition: color 0.3s ease;
        }

        .linkedin-logo:hover {
            color: #0e76a8;
        }

        .masonry-container {
            column-count: 3;  
            column-gap: 16px;  
            padding: 0px;
            width: 95%;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 40px;
            display: block;  
        }

        @media (max-width: 768px) {
            .masonry-container {
                column-count: 2;
            }
        }

        @media (max-width: 600px) {
            .masonry-container {
                column-count: 1;
            }
        }



        /* All Container */
        .all-container { 
            width: 95vw;
            margin-top: 40px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-left: auto;
            margin-right: auto;
            gap: 20px;
        }

        .all-container div {
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .all-container .active {
            color: black; 
        }

        .all-container .inactive {
            color: rgb(194, 191, 191);
        }

        .masonry-item {
            width: 110%;
            margin-bottom: 16px;
            break-inside: avoid; 
        }

        .masonry-item video {
            width: 90%;
            height: auto;
            display: block;
            border-radius: 8px;
            opacity: 0;
            transition: transform 0.4s ease, opacity 1s ease;  
        }

        .masonry-item img {
            width: 90%;
            height: auto;
            display: block;
            border-radius: 8px;
            opacity: 1;
            transition: transform 0.4s ease, opacity 1s ease;  
        }

        .masonry-item video:hover{
            cursor: pointer;
            transform: scale(1.01);  
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .masonry-container#all-posts {
            display: block; 
        }

        .masonry-container#coming-soon-posts {
            display: none; 
        }

    </style>
</head>
<body>
    <div class="header_container">
        <div style="font-size: 18px;">EMILE (MYLO) FARMAN</div>
        <a href="https://www.linkedin.com/in/emilefarman" target="_blank">
            <i class="fab fa-linkedin linkedin-logo"></i>
        </a>
    </div>

    <div class="all-container">
        <div id="all" class="active">Finished Projects</div>
        <div id="coming-soon" class="inactive">Ongoing Project Collaborations</div>
    </div>

    <div class="masonry-container" id="all-posts">
        <!-- All posts -->
        <div class="masonry-item">
            <video src="videos/JourneyToHire.mov" onmouseenter="this.play()" onmouseleave="this.pause()" muted onclick="window.location.href='description.html?product=Memories'"></video>
        </div>
        <div class="masonry-item">
            <video src="videos/IndividualProjectReduced.mov" onmouseenter="this.play()" onmouseleave="this.pause()" onloadedmetadata="this.playbackRate = 1.2" onclick="window.location.href='description.html?product=IndividualProjectReduced'"></video>
        </div>
        <div class="masonry-item">
            <video src="videos/FlareRoulette.mov" onmouseenter="this.play()" onmouseleave="this.pause()" onclick="window.location.href='description.html?product=FlareRoulette'"></video>
        </div>
        <div class="masonry-item">
            <video src="videos/ipear2.mov" onmouseenter="this.play()" onmouseleave="this.pause()" muted onclick="window.location.href='description.html?product=ipear2'"></video>
        </div>
        <div class="masonry-item">
            <video src="videos/Equity2.mov" onmouseenter="this.play()" onmouseleave="this.pause()" muted onclick="window.location.href='description.html?product=Equity2'"></video>
        </div>
    </div>

    <div class="masonry-container" id="coming-soon-posts">
        <!-- Coming Soon posts -->
        <div class="masonry-item">
            <img src="coming-soon/Kew.png" />
        </div>
        <div class="masonry-item">
            <img src="coming-soon/Cambridge.png" />
        </div>
    </div>


    <script>
        // Toggle
        document.getElementById('all').addEventListener('click', function() {
            this.classList.add('active');
            this.classList.remove('inactive');
            document.getElementById('coming-soon').classList.add('inactive');
            document.getElementById('coming-soon').classList.remove('active');
            document.getElementById('all-posts').style.display = 'block';  // Show the container
            document.getElementById('coming-soon-posts').style.display = 'none'; 
        });

        document.getElementById('coming-soon').addEventListener('click', function() {
            this.classList.add('active');
            this.classList.remove('inactive');
            document.getElementById('all').classList.add('inactive');
            document.getElementById('all').classList.remove('active');
            document.getElementById('all-posts').style.display = 'none';  // Hide the container
            document.getElementById('coming-soon-posts').style.display = 'block';
        });

        document.addEventListener("DOMContentLoaded", function() {
            const videos = document.querySelectorAll('.masonry-item video');
            videos.forEach(video => {
                video.style.animation = 'fadeIn 0.2s forwards';
                video.onload = () => {
                    video.style.opacity = 1;
                };
            });
        });
    </script>
</body>
</html>
