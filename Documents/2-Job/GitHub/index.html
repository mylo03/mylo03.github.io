<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="projectgrid.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Project Grid</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .header_container {
            width: 70vw;
            margin-top: 30px;
            margin-bottom: 40px;
            display: flex;
            font-size: 40px;
            align-items: center;
            justify-content: space-between;
            margin-left: auto;
            margin-right: auto;
        }

        .linkedin-logo {
            font-size: 45px;
            color: #555454;
            transition: color 0.3s ease;
        }

        .linkedin-logo:hover {
            color: #0e76a8;
        }

        .masonry-container {
            column-count: 3;  
            column-gap: 16px;  
            padding: 0px;
            width: 70%;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 40px;
        }

        .masonry-item {
            width: 110%;
            margin-bottom: 16px;
            break-inside: avoid; 
        }

        .masonry-item video {
            width: 90%;
            height: auto;
            display: block;
            border-radius: 8px;
            opacity: 0;
            transition: transform 0.4s ease, opacity 1s ease;  
        }



        .masonry-item video:hover{
            transform: scale(1.03);  
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .header_container div {
            color: #555454;  
        }

    </style>
</head>
<body>
    <div class="header_container">
        <div>MVPs</div>
        <a href="https://www.linkedin.com/in/mylo-farman" target="_blank">
            <i class="fab fa-linkedin linkedin-logo"></i>
        </a>
    </div>

    <div class="masonry-container">

        <div class="masonry-item">
            <video src="videos/Memories.mov" onmouseenter="this.play()" onmouseleave="this.pause()" muted onclick="window.location.href='https://example.com';"></video>
        </div>

        <div class="masonry-item">
            <video src="videos/IndividualProjectReduced.mov" onmouseenter="this.play()" onmouseleave="this.pause()" onloadedmetadata="this.playbackRate = 1.2" onclick="window.location.href='https://example.com';"></video>
        </div>

        <div class="masonry-item">
            <video src="videos/FlareRoulette.mov" onmouseenter="this.play()" onmouseleave="this.pause()" onclick="window.location.href='https://example.com';"></video>
        </div>

        <div class="masonry-item">
            <video src="videos/IMG_4532.mov" onmouseenter="this.play()" onmouseleave="this.pause()" muted onclick="window.location.href='https://example.com';"></video>
        </div>

        <div class="masonry-item">
            <video src="videos/ipear2.mov" onmouseenter="this.play()" onmouseleave="this.pause()" muted onclick="window.location.href='https://example.com';"></video>
        </div>

        <div class="masonry-item">
            <video src="videos/Equity2.mov" onmouseenter="this.play()" onmouseleave="this.pause()" muted onclick="window.location.href='https://example.com';"></video>
        </div>



    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const videos = document.querySelectorAll('.masonry-item video');
            videos.forEach(video => {
                video.style.animation = 'fadeIn 3s forwards';
                video.onload = () => {
                    video.style.opacity = 1;
                };
            });
        });
    </script>
</body>
</html>
